name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Soroban contract tests ─────────────────────────────────────────────────
  contract-tests:
    name: Contract Tests (Rust / Soroban)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('contracts/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run WorkToken tests
        working-directory: contracts
        run: cargo test -p work_token --verbose

      - name: Run EscrowContract tests
        working-directory: contracts
        run: cargo test -p escrow_contract --verbose

      - name: Run full workspace tests
        working-directory: contracts
        run: cargo test --workspace

  # ── Build Soroban contracts ────────────────────────────────────────────────
  contract-build:
    name: Build Contracts (WASM)
    runs-on: ubuntu-latest
    needs: contract-tests

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install Stellar CLI
        run: cargo install --locked stellar-cli --features opt

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('contracts/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-build-

      - name: Build WorkToken
        working-directory: contracts
        run: stellar contract build --package work_token

      - name: Build EscrowContract
        working-directory: contracts
        run: stellar contract build --package escrow_contract

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: contract-wasm
          path: |
            contracts/target/wasm32v1-none/release/work_token.wasm
            contracts/target/wasm32v1-none/release/escrow_contract.wasm

  # ── Frontend build & type check ────────────────────────────────────────────
  frontend:
    name: Frontend Build (Next.js)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_NETWORK: testnet
          NEXT_PUBLIC_HORIZON_URL: https://horizon-testnet.stellar.org
          NEXT_PUBLIC_SOROBAN_RPC: https://soroban-testnet.stellar.org
          NEXT_PUBLIC_ESCROW_CONTRACT_ID: CC7XSNBIJSFMOR7YHPKGHRSEFZWWFF6N5LUBVHCR24XRNM3UQYWK246B
          NEXT_PUBLIC_WORK_TOKEN_CONTRACT_ID: CAWVOIUBWDGXW7S34GJAKMZYJEKEDS3UJ45UP47CQ2ZFKYHFY7CBHKJI
          NEXT_PUBLIC_NATIVE_TOKEN: CDLZFC3SYJYDZT7K67VZ75HPJVIEUVNIXF47ZG2FB2RMQQVU2HHGCYSC
